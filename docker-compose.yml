# LiteLLM gateway → proxy → opencode serve on host (:4096)
#
# make up    — starts with cloudflared tunnel (litellm.ryan-schachte.com)
# make local — starts without tunnel (localhost:4000 only)

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    env_file:
      - .env
    volumes:
      - ./cacert.pem:/etc/ssl/certs/ca-certificates.crt:ro
      - ${HOME}/.cloudflared:/root/.cloudflared:ro
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
      - REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./${LITELLM_CONFIG:-config.local.yaml}:/app/config.yaml
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://llmproxy:dbpassword9090@db:5432/litellm
      - STORE_MODEL_IN_DB=True
    depends_on:
      db:
        condition: service_healthy
      proxy:
        condition: service_started
    command: --config /app/config.yaml
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared-credentials.json:/etc/cloudflared/credentials.json:ro
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      litellm:
        condition: service_healthy
    profiles:
      - tunnel
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: llmproxy
      POSTGRES_PASSWORD: dbpassword9090
      POSTGRES_DB: litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmproxy -d litellm"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
